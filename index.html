<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSu Energy | Electrochemistry Modelling and Management</title>
  <meta name="description" content="Leading the future of electrochemistry modelling and energy management solutions">
  <link rel="shortcut icon" href="assets/images/favicon.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #3056D3 0%, #13C296 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .logo img {
      width: 80px;
      height: 80px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 3rem;
      opacity: 0.9;
    }

    .language-selector {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .lang-btn {
      padding: 1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border: 2px solid white;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .lang-btn:hover {
      background: white;
      color: #3056D3;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .lang-btn {
        padding: 0.8rem 2rem;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="assets/images/logo/ts-logo-blue-small.svg" alt="TSu Energy Logo">
    </div>

    <h1>TSu Energy</h1>
    <p>Electrochemistry Modelling and Management</p>

    <div class="language-selector">
      <a href="pages/en/index.html" class="lang-btn">
        🇬🇧 English
      </a>
      <a href="pages/zh/index.html" class="lang-btn">
        🇨🇳 中文
      </a>
    </div>

    <div class="footer">
      <p>&copy; 2026 TSu Energy. All rights reserved.</p>
    </div>
  </div>

  <script>
    // Auto-redirect based on browser language (optional)
    const userLang = navigator.language || navigator.userLanguage;
    const autoRedirect = localStorage.getItem('tsu-auto-redirect');

    // Uncomment to enable auto-redirect
    // if (autoRedirect !== 'false') {
    //   if (userLang.startsWith('zh')) {
    //     window.location.href = 'pages/zh/index.html';
    //   } else {
    //     window.location.href = 'pages/en/index.html';
    //   }
    // }
  </script>
</body>
</html>
